<!DOCTYPE html>
<html>
<head>
    <title>Students</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Automated Student Attendance Monitoring and Analytics System for Colleges</h1>

<h2>Student Management</h2>

<h2>Add Student</h2>

<label>Roll Number</label><br>
<input type="text" id="roll"><br><br>

<label>Student Name</label><br>
<input type="text" id="name"><br><br>

<label>Department</label><br>
<input type="text" id="department"><br><br>

<label>Year</label><br>
<input type="text" id="year"><br><br>

<button onclick="addStudent()">Add Student</button>

<br><br>

<h2>Student List</h2>
<label>Search Student:</label><br>
<input type="text" id="searchStudent" placeholder="Enter Roll No or Name">
<br><br>

<table border="1" align="center" cellpadding="10">
<tr>
    <th>Roll No</th>
    <th>Name</th>
    <th>Department</th>
    <th>Year</th>
</tr>

<tbody id="studentTable"></tbody>

</table>
<br>

<button onclick="location.href='dashboard.html'">Back to Dashboard</button>
<script src="script.js"></script>
</body>
</html>
